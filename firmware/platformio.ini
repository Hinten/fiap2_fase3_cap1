; CardioIA — Fase 3 / Cap. 1
; Configuração compartilhada entre Parte 1 (sensores + buffer offline)
; e Parte 2 (Wi-Fi + MQTT + publish na nuvem).
;
; Para rodar no Wokwi: usar o projeto Wokwi como wrapper ou colar o
; conteúdo de src/ + include/ no editor Wokwi (ele aceita PlatformIO).

[env:esp32dev]
platform   = espressif32
board      = esp32dev
framework  = arduino
monitor_speed = 115200
upload_speed  = 921600

lib_deps =
    knolleary/PubSubClient @ ^2.8
    bblanchon/ArduinoJson @ ^7.0
    adafruit/DHT sensor library @ ^1.4.6
    adafruit/Adafruit Unified Sensor @ ^1.1.14

build_flags =
    -DCORE_DEBUG_LEVEL=2
